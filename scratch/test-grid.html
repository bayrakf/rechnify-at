<!DOCTYPE html>
<html>
<head>
<style>
.frontpage-layout {
  display: grid;
  grid-template-columns: 220px minmax(0, 1fr);
  gap: 48px;
  max-width: 1440px;
  margin: 0 auto;
  padding: 48px 24px;
}
.sidebar-nav { width: 220px; background: #eee; }
.main-content-grid { min-width: 0; }
.tool-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 24px;
}
.tool-card {
  background: #ccc;
  padding: 24px;
}
</style>
</head>
<body>
<div class="frontpage-layout">
  <div class="sidebar-nav">Sidebar</div>
  <div class="main-content-grid">
    <div class="tool-grid">
      <div class="tool-card">Card 1</div>
      <div class="tool-card">Card 2</div>
      <div class="tool-card">Card 3</div>
    </div>
  </div>
</div>
</body>
</html>
