<!DOCTYPE html>
<html>
<head>
<style>
.frontpage-layout {
  display: grid;
  grid-template-columns: 220px minmax(0, 1fr);
  gap: 48px;
  max-width: 1440px;
  margin: 0 auto;
  padding: 32px 24px;
}
.sidebar-nav { background: #eee; height: 100vh; }
.tool-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}
.tool-card { background: #ccc; height: 100px; }
</style>
</head>
<body>
<div class="frontpage-layout">
  <div class="sidebar-nav">Sidebar</div>
  <div class="main-content-grid">
    <div class="tool-grid">
      <div class="tool-card">Card 1</div>
      <div class="tool-card">Card 2</div>
      <div class="tool-card">Card 3</div>
    </div>
  </div>
</div>
</body>
</html>
